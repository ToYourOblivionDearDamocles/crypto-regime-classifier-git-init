services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./configs:/app/configs:ro
      - ./models:/app/models
      - ./data:/app/data
    command: uvicorn crypto_regime.api.main:app --host 0.0.0.0 --port 8000 --reload

  streamlit:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./configs:/app/configs:ro
      - ./models:/app/models
      - ./data:/app/data
    command: streamlit run app/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
